<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assembly Item Cost & Inventory Audit — Thrive Causemetics</title>
<style>
:root {
  --brand: #1a1a2e; --accent: #c0392b; --gold: #e2a608;
  --bg: #f4f5f9; --card: #fff; --border: #e1e4e8;
  --text: #1e2328; --muted: #6b7280;
  --ms: #2563eb; --ca: #7c3aed; --nv: #059669; --amz: #d97706;
  --outlier-bg: #fffbeb; --outlier-border: #f59e0b;
  --zero-bg: #fff1f2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:13px}

/* HEADER */
.hdr{background:var(--brand);color:#fff;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:.2px}
.hdr-meta{font-size:11px;color:#94a3b8;margin-top:2px}

/* FILTERS */
.filters{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;position:sticky;top:60px;z-index:190}
.filters input,.filters select{border:1px solid var(--border);border-radius:6px;padding:6px 11px;font-size:12px;background:var(--bg);color:var(--text);outline:none}
.filters input:focus,.filters select:focus{border-color:var(--brand)}
#search-box{width:210px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;cursor:pointer;background:var(--card);color:var(--muted);transition:.15s}
.chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn{background:var(--brand);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;white-space:nowrap}
.ml-auto{margin-left:auto;display:flex;gap:8px}

/* STATS BAR */
.stats{padding:10px 24px;display:flex;flex-wrap:wrap;gap:10px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 16px;min-width:140px}
.stat-val{font-size:20px;font-weight:700;line-height:1.1}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.ms-c{color:var(--ms)} .ca-c{color:var(--ca)} .nv-c{color:var(--nv)} .amz-c{color:var(--amz)}

/* MAIN */
.main{padding:0 24px 48px}
.no-results{text-align:center;padding:64px;color:var(--muted);display:none}

/* FAMILY CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden}
.card-hdr{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;background:#f8f9fb;border-bottom:1px solid var(--border);user-select:none;transition:.12s}
.card-hdr:hover{background:#eef0f5}
.chevron{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.card.collapsed .chevron{transform:rotate(-90deg)}
.card.collapsed .card-body{display:none}
.fam-name{font-weight:600;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:10px;border-radius:10px;padding:2px 8px;white-space:nowrap}
.badge-gray{background:#e9ecef;color:var(--muted)}
.badge-warn{background:#fef3c7;color:#92400e;border:1px solid #f59e0b}
.badge-zero{background:#fee2e2;color:#991b1b}

/* SUMMARY STRIP */
.fam-summary{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.sum-loc{padding:9px 14px;border-right:1px solid var(--border)}
.sum-loc:last-child{border-right:none}
.sum-loc-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.sum-row{font-size:11px;color:var(--muted);line-height:1.75}
.sum-row b{color:var(--text);font-weight:600}

/* SKU TABLE */
.sku-tbl{width:100%;border-collapse:collapse}
.sku-tbl thead th{background:#f0f2f6;padding:7px 11px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
.sku-tbl thead th.r{text-align:right}
.sku-tbl tbody tr{border-bottom:1px solid #f1f3f5}
.sku-tbl tbody tr:last-child{border-bottom:none}
.sku-tbl tbody tr:hover{background:#fafbfc}
.sku-tbl td{padding:8px 11px;vertical-align:top}
.sku-td{font-weight:700;color:var(--brand);width:90px;white-space:nowrap}
.name-td{color:var(--muted);font-size:11px;max-width:200px;line-height:1.4}
.loc-td{text-align:right;width:110px;padding-right:14px}
.loc-cost{font-weight:600;font-size:12px}
.loc-sub{font-size:10px;color:var(--muted);line-height:1.7}
.loc-sub .cm-hi{color:#dc2626;font-weight:700}
.loc-sub .cm-pct{font-size:9px}
.no-loc{color:#d1d5db;text-align:center;font-size:11px}
tr.outlier-row{background:var(--outlier-bg)}
tr.outlier-row:hover{background:#fef9e7}
tr.zero-row{background:var(--zero-bg)}
tr.zero-row:hover{background:#ffe4e6}
.z-badge{display:inline-block;font-size:9px;background:var(--gold);color:#fff;border-radius:6px;padding:1px 5px;margin-left:4px;vertical-align:middle}
.na{color:#d1d5db}

/* RESPONSIVE */
@media(max-width:860px){.fam-summary{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

      <div class="sum-row">StdDev: <b>${s.cost_stdev!=null?'$'+parseFloat(s.cost_stdev).toFixed(4):'—'}</b></div>
      <div class="sum-row">On Hand: <b>${fmt(s.total_on_hand)}</b></div>
      <div class="sum-row">Available: <b>${fmt(s.total_available)}</b></div>
      <div class="sum-row">Committed: <b>${fmt(s.total_committed)}</b></div>
    </div>`;
  }).join('');
}

function buildRow(s, locFilter){
  const outCls = s.is_outlier ? 'outlier-row' : '';
  const allZeroAv = LOCS.every(l=>!s.locations[l]||(s.locations[l].available||0)===0);
  const zeroCls = (!s.is_outlier && allZeroAv && LOCS.some(l=>s.locations[l])) ? 'zero-row' : '';
  
  const locCells = LOCS.map(loc=>{
    const sh = LOC_SHORT[loc];
    if(locFilter && loc!==locFilter) return `<td class="loc-td lc-${sh}" style="display:none"></td>`;
    const ld = s.locations[loc];
    if(!ld) return `<td class="loc-td lc-${sh} no-loc">—</td>`;
    const cmP = pct(ld.committed, ld.on_hand);
    const cmCls = cmP>50 ? 'cm-hi' : '';
    const zBadge = ld.is_outlier && ld.z_score!=null ? `<span class="z-badge">z=${ld.z_score}</span>` : '';
    const costDisp = ld.cost!=null ? `<span class="${ld.is_outlier?'outlier-cost':''}">${fmtC(ld.cost)}</span>${zBadge}` : '<span class="na">—</span>';
    return `<td class="loc-td lc-${sh}">
      <div class="loc-cost">${costDisp}</div>
      <div class="loc-sub">OH: ${fmt(ld.on_hand)}</div>
      <div class="loc-sub">Av: ${fmt(ld.available)}</div>
      <div class="loc-sub"><span class="${cmCls}">Cm: ${fmt(ld.committed)}${cmP>50?' ⚠ '+cmP+'%':''}</span></div>
    </td>`;
  }).join('');

  const locHeaders = LOCS.map(loc=>{
    const sh=LOC_SHORT[loc];
    const cls=LOC_CLS[loc];
    if(locFilter&&loc!==locFilter) return `<th class="r lc-${sh}" style="display:none">${loc}</th>`;
    return `<th class="r lc-${sh} ${cls}">${loc}</th>`;
  }).join('');

  return {row:`<tr id="row-${CSS.escape(s.sku)}" class="${outCls} ${zeroCls}">
    <td class="sku-td">${s.sku}</td>
    <td class="name-td">${s.full_name||''}</td>
    ${locCells}
  </tr>`, headers: locHeaders};
}

function skuPassesFilter(s, search, locFilter){
  if(search && !s.sku.toLowerCase().includes(search) &&
     !(s.full_name||'').toLowerCase().includes(search) &&
     !(s.family||'').toLowerCase().includes(search)) return false;
  if(chips.outliers && !s.is_outlier) return false;
  if(chips.zerocost){
    const hasCost = LOCS.some(l=>s.locations[l]&&s.locations[l].cost!=null);
    if(hasCost) return false;
  }
  const checkLocs = locFilter ? [locFilter] : LOCS;
  if(chips.instock){
    if(!checkLocs.some(l=>s.locations[l]&&(s.locations[l].on_hand||0)>0)) return false;
  }
  if(chips.zeroav){
    if(!checkLocs.some(l=>s.locations[l]&&(s.locations[l].available||0)===0)) return false;
  }
  if(chips.highcm){
    if(!checkLocs.some(l=>{
      const ld=s.locations[l]; return ld&&pct(ld.committed,ld.on_hand)>50;
    })) return false;
  }
  return true;
}

function render(){
  const search    = document.getElementById('search-box').value.toLowerCase().trim();
  const famFilter = document.getElementById('fam-sel').value;
  const locFilter = document.getElementById('loc-sel').value;

  let html='', visF=0, visS=0;

  D.families.forEach(fam=>{
    if(famFilter && fam.name!==famFilter) return;
    const visSkus = fam.skus.filter(s=>skuPassesFilter(s,search,locFilter));
    if(!visSkus.length) return;
    visF++; visS+=visSkus.length;

    const outlierCount = visSkus.filter(s=>s.is_outlier).length;
    const zeroAvCount  = visSkus.filter(s=>LOCS.every(l=>!s.locations[l]||(s.locations[l].available||0)===0)&&LOCS.some(l=>s.locations[l])).length;

    let badges='';
    if(outlierCount) badges+=`<span class="badge badge-warn">${outlierCount} outlier${outlierCount>1?'s':''}</span>`;
    if(zeroAvCount)  badges+=` <span class="badge badge-zero">${zeroAvCount} zero avail</span>`;

    // build rows (all have same headers so grab from first)
    const built = visSkus.map(s=>buildRow(s,locFilter));
    const headers = built[0].headers;
    const rows    = built.map(b=>b.row).join('');

    html+=`<div class="card" id="fcard-${CSS.escape(fam.name)}">
      <div class="card-hdr" onclick="this.closest('.card').classList.toggle('collapsed')">
        <span class="chevron">▼</span>
        <span class="fam-name" title="${fam.name}">${fam.name}</span>
        <span class="badge badge-gray">${fam.skus.length} SKU${fam.skus.length!==1?'s':''}</span>
        ${badges}
      </div>
      <div class="card-body">
        <div class="fam-summary">${buildFamSummary(fam)}</div>
        <table class="sku-tbl">
          <thead><tr>
            <th>SKU</th><th>Full Name</th>${headers}
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  });

  document.getElementById('main').innerHTML = html || '';
  document.getElementById('no-results').style.display = html ? 'none' : 'block';
  updateStats(visF, visS, locFilter);
}

function updateStats(fams, skus, locFilter){
  const checkLocs = locFilter ? [locFilter] : LOCS;
  let totalOH={}, totalAV={}, totalCM={};
  LOCS.forEach(l=>{totalOH[l]=0;totalAV[l]=0;totalCM[l]=0;});
  D.families.forEach(fam=>fam.skus.forEach(s=>{
    LOCS.forEach(l=>{
      const ld=s.locations[l]||{};
      totalOH[l]+=(ld.on_hand||0);
      totalAV[l]+=(ld.available||0);
      totalCM[l]+=(ld.committed||0);
    });
  }));
  let pills=`
    <div class="stat"><div class="stat-val">${fams}</div><div class="stat-lbl">Families</div></div>
    <div class="stat"><div class="stat-val">${skus}</div><div class="stat-lbl">SKUs</div></div>`;
  checkLocs.forEach(l=>{
    const cls=LOC_CLS[l];
    pills+=`<div class="stat">
      <div class="stat-val ${cls}">${totalOH[l].toLocaleString()}</div>
      <div class="stat-lbl">${l} — On Hand</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">Avail: ${totalAV[l].toLocaleString()} &nbsp;·&nbsp; Cmtd: ${totalCM[l].toLocaleString()}</div>
    </div>`;
  });
  document.getElementById('stats-bar').innerHTML = pills;
}

function collapseAll(){document.querySelectorAll('.card').forEach(c=>c.classList.add('collapsed'));document.getElementById('btn-toggle').textContent='Expand All';document.getElementById('btn-toggle').onclick=expandAll;}
function expandAll(){document.querySelectorAll('.card').forEach(c=>c.classList.remove('collapsed'));document.getElementById('btn-toggle').textContent='Collapse All';document.getElementById('btn-toggle').onclick=collapseAll;}

// Populate family dropdown
function init(){
  const sel=document.getElementById('fam-sel');
  D.families.forEach(f=>{
    const o=document.createElement('option');
    o.value=o.textContent=f.name; sel.appendChild(o);
  });
  render();
}
init();
</script>
