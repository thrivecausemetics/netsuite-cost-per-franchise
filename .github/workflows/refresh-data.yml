name: Refresh dashboard data from NetSuite

on:
  schedule:
    # Daily 15:07 UTC = 8:07am PDT (7:07am PST). Minute :07 dodges GitHub's
    # top-of-hour scheduling delays. Scheduled runs publish LIVE.
    - cron: "7 15 * * *"
  workflow_dispatch:
    inputs:
      publish_live:
        description: "Publish live (update index.html and push). Default is a dry-run that only uploads index.sample.html as an artifact."
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh dashboard
        env:
          NS_ACCOUNT_ID: ${{ secrets.NS_ACCOUNT_ID }}
          NS_CONSUMER_KEY: ${{ secrets.NS_CONSUMER_KEY }}
          NS_CONSUMER_SECRET: ${{ secrets.NS_CONSUMER_SECRET }}
          NS_TOKEN_ID: ${{ secrets.NS_TOKEN_ID }}
          NS_TOKEN_SECRET: ${{ secrets.NS_TOKEN_SECRET }}
          # Scheduled runs always publish live; manual dispatch is gated
          # behind the publish_live input and dry-runs by default.
          PUBLISH: ${{ github.event_name == 'schedule' || inputs.publish_live }}
        run: |
          if [ "$PUBLISH" = "true" ]; then
            python scripts/refresh_from_netsuite.py --publish
          else
            python scripts/refresh_from_netsuite.py
          fi

      - name: Commit and push live data
        if: github.event_name == 'schedule' || inputs.publish_live
        run: |
          if git diff --quiet index.html; then
            echo "No data changes today."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "data: daily NetSuite refresh $(date -u +%F)"
          for delay in 2 4 8 16 0; do
            git push && exit 0
            [ "$delay" = "0" ] && exit 1
            echo "push failed, retrying in ${delay}s"
            sleep "$delay"
            git pull --rebase
          done

      - name: Upload dry-run sample
        if: github.event_name == 'workflow_dispatch' && !inputs.publish_live
        uses: actions/upload-artifact@v4
        with:
          name: index.sample.html
          path: index.sample.html
